<div class="w-full overflow-x-auto rounded-xl border border-slate-100 bg-white shadow-md shadow-slate-100/70" dir="rtl">
  <table class="w-full min-w-[700px] border-collapse text-right text-sm">
    <thead class="bg-slate-50 text-slate-700 border-b border-slate-200">
    <tr>
      <th class="p-4 font-semibold">اسم الفرع</th>
      <th class="p-4 font-semibold">الكود</th>
      <th class="p-4 font-semibold">الحالة</th>
      <th class="p-4 font-semibold">الإجراءات</th>
    </tr>
    </thead>

    <tbody class="divide-y divide-slate-100 text-slate-600">
      @for (branch of branchStore.branches(); track branch.id) {
        <tr class="transition-colors duration-200 hover:bg-slate-50/70">

          <td class="p-4 font-medium text-slate-900">
            <div class="flex items-center gap-2.5">
              <svg lucideHospital class="w-4 h-4 text-sky-600"></svg>
              <span>{{ branch.name }}</span>
            </div>
          </td>

          <td class="p-4">
            <span class="rounded-md bg-slate-100 px-2 py-1 font-mono text-xs text-slate-700 border border-slate-200/50">
              {{ branch.code }}
            </span>
          </td>

          <td class="p-4">
            <span
              class="inline-flex items-center rounded-full px-2.5 py-1 text-xs font-semibold tracking-wide transition-all"
              [class]="branch.isActive
                    ? 'bg-emerald-50 text-emerald-700 border border-emerald-200/60'
                    : 'bg-rose-50 text-rose-700 border border-rose-200/60'">
              <span class="ml-1.5 h-1.5 w-1.5 rounded-full"
                    [class]="branch.isActive ? 'bg-emerald-500' : 'bg-rose-500'"></span>
              {{ branch.isActive ? 'نشط' : 'غير نشط' }}
            </span>
          </td>

          <td class="p-4">
            <div class="flex items-center gap-1.5">
              <button
                (click)="showDialogDetails(branch.id)"
                class="flex h-8 w-8 items-center justify-center rounded-lg text-slate-400 border border-transparent transition-all hover:bg-sky-50 hover:text-sky-600 hover:border-sky-100"
                title="عرض">
                <svg lucideEye class="w-4 h-4"></svg>
              </button>

              <button
                (click)="showDialogEdit(branch.id)"
                class="flex h-8 w-8 items-center justify-center rounded-lg text-slate-400 border border-transparent transition-all hover:bg-amber-50 hover:text-amber-600 hover:border-amber-100"
                title="تعديل">
                <svg lucidePencil class="w-4 h-4"></svg>
              </button>

              <button
                (click)="showDeleteConfirmation(branch.id, branch.name)"
                class="flex h-8 w-8 items-center justify-center rounded-lg text-slate-400 border border-transparent transition-all hover:bg-red-50 hover:text-red-600 hover:border-red-100"
                title="حذف">
                <svg lucideTrash2 class="w-4 h-4"></svg>
              </button>
            </div>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="4" class="p-6 text-center text-slate-400">
            لا توجد فروع مسجلة حاليًا.
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
