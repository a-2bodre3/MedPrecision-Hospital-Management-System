<div dir="rtl" class="p-6 text-center">
  <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-rose-50 text-rose-600">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
         stroke="currentColor" class="h-6 w-6">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
    </svg>
  </div>

  <h3 class="mb-2 text-lg font-bold text-slate-800">تأكيد الحذف</h3>
  <p class="mb-6 text-sm leading-relaxed text-slate-500">
    هل أنت متأكد من أنك تريد حذف هذا الفرع؟
    @if (branchName) {
      <br>
      <span class="font-semibold text-slate-700">"{{ branchName }}"</span>
    }
  </p>

  <div class="flex items-center justify-center gap-3">
    <button
      (click)="confirm()"
      class="cursor-pointer rounded-xl bg-rose-600 px-5 py-2 text-sm font-bold text-white shadow-lg shadow-rose-500/20 transition-all duration-200 hover:bg-rose-700 active:scale-[0.98]">
      حذف
    </button>
    <button
      (click)="cancel()"
      class="cursor-pointer rounded-xl bg-slate-100 px-5 py-2 text-sm font-medium text-slate-600 transition-all duration-200 hover:bg-slate-200 active:scale-[0.98]">
      إلغاء
    </button>
  </div>
</div>
