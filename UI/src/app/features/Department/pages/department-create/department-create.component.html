<div dir="rtl">
  <header
    class="flex items-center justify-between p-5 border-b border-slate-100 bg-gradient-to-b from-slate-50/50 to-white">
    <div class="flex items-center gap-4">
      <div class="flex items-center justify-center w-11 h-11 bg-blue-50 text-blue-600 rounded-xl">
        <svg lucideWaypoints></svg>
      </div>
      <div>
        <h2 class="text-lg font-bold text-slate-800 m-0">انشاء قسم جديد</h2>
        <p class="text-xs text-slate-500 mt-1 m-0">لانشاء قسم جديد ادخل البيانات المطلوبه</p>
      </div>
    </div>
    <button (click)="closeDialog()"
            class="p-2 text-slate-400 hover:text-red-500 hover:bg-slate-100 rounded-lg transition-colors duration-200"
            aria-label="Close dialog">

      <svg lucideXCircle></svg>

    </button>
  </header>
  <form (submit)="onSubmit($event)" class="max-w-2xl mx-auto p-6 bg-white rounded-xl shadow-sm border border-slate-100">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-slate-700">اسم القسم</label>
        <input
          type="text"
          [formField]="departmentForm.name"
          placeholder="أدخل اسم القسم مثلاً: العيادة الخارجية"
          class="w-full px-3.5 py-2 text-sm text-slate-800 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 focus:bg-white transition-all duration-200"
        >
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-slate-700">الفرع الرئيسي</label>
        <div class="relative">
          <select
            [formField]="departmentForm.branchId"
            class="w-full px-3.5 py-2 text-sm text-slate-800 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 focus:bg-white appearance-none cursor-pointer transition-all duration-200"
          >
            <option selected disabled>اختر الفرع...</option>
            @for (branch of branchStore.branches(); track branch.id) {
              <option [value]="branch.id">{{ branch.name }}</option>
            }
          </select>
          <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                 stroke="currentColor" class="w-4 h-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="flex flex-col gap-1.5 md:col-span-2">
        <label class="text-sm font-semibold text-slate-700">وصف القسم</label>
        <textarea
          [formField]="departmentForm.description!"
          rows="4"
          placeholder="اكتب وصفاً مختصراً عن طبيعة عمل هذا القسم..."
          class="w-full px-3.5 py-2 text-sm text-slate-800 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 focus:bg-white resize-none transition-all duration-200"
        ></textarea>
      </div>
    </div>

    <div class="flex items-center justify-end gap-3 mt-6 pt-4 border-t border-slate-100">
      <button
        type="submit"
        class="px-5 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 active:bg-blue-800 rounded-lg shadow-sm shadow-blue-100 transition-colors duration-200"
      >
        حفظ البيانات
      </button>
    </div>
  </form>
</div>
