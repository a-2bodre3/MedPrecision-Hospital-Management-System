<div dir="rtl">
  <header
    class="flex items-center justify-between p-5 border-b border-slate-100 bg-gradient-to-b from-slate-50/50 to-white">
    <div class="flex items-center gap-4">
      <div class="flex items-center justify-center w-11 h-11 bg-blue-50 text-blue-600 rounded-xl">
        <svg lucideWaypoints></svg>
      </div>
      <div>
        <h2 class="text-lg font-bold text-slate-800 m-0">تعديل بيانات الغرفة</h2>
        <p class="text-xs text-slate-500 mt-1 m-0">تعديل البيانات الخاصة بالغرفة المحددة حالياً</p>
      </div>
    </div>
    <button (click)="closeDialog()"
            class="p-2 text-slate-400 hover:text-red-500 hover:bg-slate-100 rounded-lg transition-colors duration-200 cursor-pointer"
            aria-label="إغلاق">
      <svg lucideXCircle></svg>
    </button>
  </header>

  <form (submit)="onSubmit($event)" class="max-w-2xl mx-auto p-6 bg-white rounded-xl">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-slate-700">رقم الغرفة <span class="text-red-500">*</span></label>
        <input [formField]="roomForm.roomNumber"
               type="text"
               class="w-full px-3.5 py-2 text-sm text-slate-800 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 focus:bg-white transition-all duration-200"/>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-slate-700">الطابق <span class="text-red-500">*</span></label>
        <input [formField]="roomForm.floor"
               type="number"
               class="w-full px-3.5 py-2 text-sm text-slate-800 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 focus:bg-white transition-all duration-200"/>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-slate-700">نوع الغرفة <span class="text-red-500">*</span></label>
        <div class="relative">
          <select [formField]="roomForm.roomType"
                  class="w-full px-3.5 py-2 text-sm text-slate-800 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 focus:bg-white appearance-none cursor-pointer transition-all duration-200">
            @for (option of roomTypeOptions; track option.value) {
              <option [value]="option.value">{{ option.label }}</option>
            }
          </select>
          <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                 stroke="currentColor" class="w-4 h-4">
            </svg>
          </div>
        </div>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-slate-700">السعة (عدد الأسرة) <span
          class="text-red-500">*</span></label>
        <input [formField]="roomForm.capacity"
               type="number"
               class="w-full px-3.5 py-2 text-sm text-slate-800 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 focus:bg-white transition-all duration-200"/>
      </div>

      <div class="flex flex-col gap-1.5 md:col-span-2">
        <label class="text-sm font-semibold text-slate-700">الفرع المتابع له <span class="text-red-500">*</span></label>
        <div class="relative">
          <select [formField]="roomForm.branchId"
                  (change)="onBranchChange()"
                  class="w-full px-3.5 py-2 text-sm text-slate-800 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 focus:bg-white appearance-none cursor-pointer transition-all duration-200">
            @for (branch of branchStore.branches(); track branch.id) {
              <option [value]="branch.id">{{ branch.name }}</option>
            }
          </select>
          <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                 stroke="currentColor" class="w-4 h-4">

            </svg>
          </div>
        </div>
      </div>

      <div class="flex flex-col gap-1.5 md:col-span-2">
        <label class="text-sm font-semibold text-slate-700">القسم / التخصص <span class="text-red-500">*</span></label>
        <div class="relative">
          <select [formField]="roomForm.departmentId"
                  class="w-full px-3.5 py-2 text-sm text-slate-800 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 focus:bg-white appearance-none cursor-pointer transition-all duration-200">
            @for (dept of getFilteredDepartments(); track dept.id) {
              <option [value]="dept.id">{{ dept.name }}</option>
            }
          </select>
          <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                 stroke="currentColor" class="w-4 h-4">

            </svg>
          </div>
        </div>
      </div>

      <div class="flex flex-col gap-1.5 md:col-span-2">
        <label class="text-sm font-semibold text-slate-700">حالة الغرفة <span class="text-red-500">*</span></label>
        <div class="relative">
          <select [formField]="roomForm.isActive"
                  class="w-full px-3.5 py-2 text-sm text-slate-800 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 focus:bg-white appearance-none cursor-pointer transition-all duration-200">
            <option value="true">نشط (متاحة للاستخدام وطواقم العمل)</option>
            <option value="false">غير نشط (خارج الخدمة حالياً)</option>
          </select>
          <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                 stroke="currentColor" class="w-4 h-4">

            </svg>
          </div>
        </div>
      </div>

    </div>

    <div class="flex items-center justify-end gap-3 mt-6 pt-4 border-t border-slate-100">
      <button type="button" (click)="closeDialog()"
              class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-200 hover:bg-slate-50 rounded-lg transition-colors duration-200 cursor-pointer">
        إلغاء
      </button>
      <button type="submit"
              class="px-5 py-2 text-sm font-medium text-white bg-amber-600 hover:bg-amber-700 active:bg-amber-800 rounded-lg shadow-sm transition-colors duration-200 cursor-pointer">
        تحديث البيانات
      </button>
    </div>
  </form>
</div>
