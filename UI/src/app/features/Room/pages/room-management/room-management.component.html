<div class="flex flex-col gap-6">
  <app-header
    title="إدارة الغرف"
    description="عرض وتنظيم كافة الغرف الطبية والإدارية"
  >
    <button hlmBtn (click)="showDialogCreate()" class="bg-[#155dfc] hover:bg-[#155dfc]/80 cursor-pointer text-white">
      <svg lucideBed class="w-4 h-4 ml-2"></svg>
      إضافة غرفة جديدة
    </button>
  </app-header>

  <div class="flex flex-wrap items-center gap-4 bg-white p-4 rounded-xl border border-slate-100 shadow-sm" dir="rtl">
    <div class="flex items-center gap-2">
      <span class="text-sm font-medium text-slate-500">تصفية حسب النوع:</span>
      <div class="relative min-w-[220px]">
        <select
          [value]="selectedRoomType() ?? ''"
          (change)="onRoomTypeFilterChange($event)"
          class="w-full px-3.5 py-2 text-sm text-slate-800 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 focus:bg-white appearance-none cursor-pointer transition-all duration-200"
        >
          <option value="">كل الأنواع</option>
          @for (type of roomTypes; track type.value) {
            <option [value]="type.value">{{ type.label }}</option>
          }
        </select>
        <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-slate-400">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
               stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <app-room-list [roomType]="selectedRoomType()" />
</div>
