<div class="flex flex-col gap-6">
  <app-header
    title="إدارة الموظفين"
    description="عرض وتنظيم حسابات الموظفين والصلاحيات والبيانات الوظيفية"
  >
    <button hlmBtn (click)="goToCreate()" class="bg-[#155dfc] hover:bg-[#155dfc]/80 cursor-pointer">
      <svg lucideUserPlus class="w-4 h-4 ml-2"></svg>
      إضافة موظف
    </button>
    <button hlmBtn variant="outline" (click)="addDoctorPlaceholder()" class="cursor-pointer">
      <svg lucideStethoscope class="w-4 h-4 ml-2"></svg>
      إضافة طبيب
    </button>
  </app-header>

  <div class="flex flex-wrap items-center gap-4 bg-white p-4 rounded-xl border border-slate-100 shadow-sm" dir="rtl">
    <div class="flex flex-col gap-1.5 min-w-[240px]">
      <label class="text-sm font-medium text-slate-500">بحث عام</label>
      <input
        type="search"
        [value]="employeeStore.queryParameters().searchTerm ?? ''"
        (input)="onSearchChange($event)"
        placeholder="الاسم، البريد، الوظيفة..."
        class="w-full px-3.5 py-2 text-sm text-slate-800 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 focus:bg-white transition-all duration-200"
      >
    </div>


    <div class="flex flex-col gap-1.5 min-w-[220px]">
      <label class="text-sm font-medium text-slate-500">القسم</label>
      <select
        [value]="employeeStore.queryParameters().departmentId ?? ''"
        (change)="onDepartmentChange($event)"
        class="w-full px-3.5 py-2 text-sm text-slate-800 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 focus:bg-white appearance-none cursor-pointer transition-all duration-200"
      >
        <option value="">كل الأقسام</option>
        @for (department of lookupsStore.departments(); track department.id) {
          <option [value]="department.id">{{ department.name }}</option>
        }
      </select>
    </div>

    <label class="flex items-center gap-2 pt-6 text-sm font-medium text-slate-600 cursor-pointer">
      <input
        type="checkbox"
        (change)="onIncludeInactiveChange($event)"
        class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500"
      >
      عرض النشط
    </label>
  </div>

  <app-employee-table/>
</div>
