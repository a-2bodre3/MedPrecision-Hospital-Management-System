<div class=" space-y-5 ">

  <div class="flex justify-center">
    <div class="w-14 h-14 rounded-full bg-red-100 flex items-center justify-center">
      <svg class="w-7 h-7 text-red-600" fill="none" stroke="currentColor" stroke-width="2"
           viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M6 18L18 6M6 6l12 12" />
      </svg>
    </div>
  </div>

  <h2 class="text-lg font-bold text-gray-800 text-center">
    تأكيد الحذف
  </h2>

  <p class="text-sm text-gray-500 text-center leading-relaxed">
    هل أنت متأكد أنك تريد حذف هذا الموعد؟<br />
    لا يمكن التراجع عن هذا الإجراء بعد الحذف.
  </p>


  <div class="flex gap-3 pt-2">

    <button
      class="flex-1 py-2.5 rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 transition"
      (click)="onClose()">
      إلغاء
    </button>

    <button
      class="flex-1 py-2.5 rounded-lg bg-red-600 text-white hover:bg-red-700 transition"
      (click)="onDelete()">
      حذف
    </button>

  </div>
</div>
