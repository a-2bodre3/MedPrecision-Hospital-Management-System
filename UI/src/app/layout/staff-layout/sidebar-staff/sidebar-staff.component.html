<hlm-sidebar side="right" class="border-0 bg-white shadow-sm flex flex-col">

  <div class="px-4 py-6 flex items-center gap-3 shrink-0">
    <img [src]="authStore.image()" class="size-12 rounded-full border-2 border-blue-100" alt="Profile">
    <div>
      <h3 class="text-sm font-bold text-gray-900">{{ authStore.name() }}</h3>
      <p class="text-xs text-blue-600 font-medium bg-blue-50 px-2 py-0.5 rounded-full inline-block mt-1">
        {{ authStore.role() }}</p>
    </div>
  </div>

  <div class="px-3 flex-1 space-y-1 overflow-y-auto">
    <button
      class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg bg-blue-600 text-white text-sm font-medium shadow-md shadow-blue-200">
      <svg lucideLayoutDashboard class="size-4"></svg>
      لوحة التحكم
    </button>

    @for (item of items(); track item.title) {
      <hlm-collapsible class="group">
        <button hlmCollapsibleTrigger
                class="w-full flex items-center justify-between px-3 py-2.5 text-sm text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition">
          <span class="flex items-center gap-3">
            <svg [lucideIcon]="item.icon" class="size-4"></svg>
            {{ item.title }}
          </span>
          <svg lucideChevronRight class="size-4 transition-transform group-data-[state=open]:rotate-90"></svg>
        </button>

        <hlm-collapsible-content>
          <div class="ms-4 mt-1 space-y-1 border-s border-gray-200 ps-2">
            @for (subItem of item.items; track subItem.title) {
              <button
                *appHasPermission="subItem.permission"
                [routerLink]="subItem.link"
                [routerLinkActiveOptions]="{ exact: true }"
                routerLinkActive="px-3 py-2.5 rounded-lg bg-blue-600 text-white text-sm font-medium shadow-md shadow-blue-200"
                class="w-full text-right px-3 py-2 text-sm text-gray-500 hover:text-blue-600 hover:bg-gray-50 rounded-lg transition">
                {{ subItem.title }}
              </button>
            }
          </div>
        </hlm-collapsible-content>
      </hlm-collapsible>
    }
  </div>

  <div class="p-4 border-t border-gray-100 shrink-0">
    <button (click)="logout()"
            class="w-full flex items-center gap-2 text-sm text-gray-500 hover:text-red-600 transition">
      <svg lucideLogOut class="size-4"></svg>
      تسجيل الخروج
    </button>
  </div>

</hlm-sidebar>
